stage:
  CONTROLLER_NAME: "E-727"
  SERIAL_NUM: "0120036309"
  STAGE_MODEL: "P-517.3CD"
  NUM_AXES: 3

piezo_motion:
  major_axis_wait: 0.2 #s
  minor_axis_wait: 0.1 #s
  settle_time: 1.5 #s
  autozero_on_connect: false

hydraharp:
  name: "hydraharp_400"
  default_mode: "hist"

  sync:
    syncDivider: 1 # (unitless) count evert nth pulse
    syncCFDlevel: 50 # (mv) voltage threshold to recognize sync pulse
    syncCFDZeroCross: 10 # (mv) const fraction discriminator
    

    # CFD helps record the timing at which voltages were recieved 
    # by comparing them to itself while also splitting/treating the voltage.
    # This reduces timing bias from pulse height differences.